name: max-phase-paper
channels:
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python=3.11

  # Data manipulation and numerical computing
  - pandas>=1.5.0
  - numpy>=1.23.0
  - pyarrow>=10.0.0

  # Scientific computing
  - scipy>=1.9.0

  # Crystallography and materials science
  - pymatgen>=2023.1.0
  - smact==3.0.1

  # Visualization
  - matplotlib>=3.5.0
  - bokeh>=3.0.0
  - selenium>=4.0.0

  # Jupyter support
  - jupyter>=1.0.0
  - ipython>=8.0.0
  - ipywidgets>=7.6.0

  # Utilities
  - tqdm>=4.60.0
  - huggingface_hub>=0.16.0

  # Browser drivers for selenium (bokeh PNG export)
  - firefox>=100.0
  - geckodriver>=0.33.0
